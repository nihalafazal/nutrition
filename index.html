<!DOCTYPE html>
<html>
<head>

<title>NutriSense AI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7f5;
}

header{
background:#2e7d66;
color:white;
padding:15px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:15px;
background:#e2ece7;
padding:10px;
}

button{
padding:10px 15px;
border:none;
background:#2e7d66;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#1e5a49;
}

.section{
display:none;
padding:30px;
}

.active{
display:block;
}

textarea,input{
width:80%;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h2>NutriSense AI 🍎</h2>

</header>


<nav>

<button onclick="navigate('chat')">Chat</button>

<button onclick="navigate('analyzer')">Meal Analyzer</button>

<button onclick="navigate('knowledge')">Knowledge</button>

</nav>


<!-- CHAT SECTION -->

<div id="chat" class="section active">

<h3>Nutrition Chat Assistant</h3>

<input id="chatInput" placeholder="Ask nutrition question">

<br><br>

<button onclick="sendChat()">Ask</button>

<p id="chatResult"></p>

</div>



<!-- ANALYZER SECTION -->

<div id="analyzer" class="section">

<h3>Meal Analyzer</h3>

<textarea id="mealInput" placeholder="Describe your meal"></textarea>

<br><br>

<button onclick="analyzeMeal()">Analyze</button>

<p id="mealResult"></p>

</div>



<!-- KNOWLEDGE SECTION -->

<div id="knowledge" class="section">

<h3>Nutrition Knowledge Base</h3>

<input id="knowledgeInput" placeholder="Search topic">

<br><br>

<button onclick="searchKnowledge()">Search</button>

<p id="knowledgeResult"></p>

</div>



<script>

/* ============================
PUT YOUR GEMINI API KEY HERE
============================ */

const API_KEY = "AIzaSyBO3BYCAqKn-ns2DZ6YS-XC0bysAy7yncE";



/* ============================
URL HASH NAVIGATION SYSTEM
============================ */

function navigate(section){

window.location.hash = section;

showSection(section);

}


function showSection(section){

document.querySelectorAll(".section").forEach(s=>{

s.classList.remove("active");

});

document.getElementById(section).classList.add("active");

}


window.addEventListener("load",()=>{

let hash = window.location.hash.replace("#","");

if(hash){

showSection(hash);

}

});



/* ============================
GEMINI API FUNCTION
============================ */

async function callGemini(prompt){

const response = await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

contents:[

{

parts:[

{

text:prompt

}

]

}

]

})

}

);

const data = await response.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text

|| "No response received.";

}



/* ============================
CHAT FUNCTION
============================ */

async function sendChat(){

let text=document.getElementById("chatInput").value;

if(!text) return;

document.getElementById("chatResult").innerText="Thinking...";

let reply=await callGemini(text);

document.getElementById("chatResult").innerText=reply;

}



/* ============================
MEAL ANALYZER FUNCTION
============================ */

async function analyzeMeal(){

let meal=document.getElementById("mealInput").value;

if(!meal) return;

document.getElementById("mealResult").innerText="Analyzing...";

let reply=await callGemini(

"Analyze this meal nutritionally and suggest improvements: "+meal

);

document.getElementById("mealResult").innerText=reply;

}



/* ============================
KNOWLEDGE FUNCTION
============================ */

async function searchKnowledge(){

let topic=document.getElementById("knowledgeInput").value;

if(!topic) return;

document.getElementById("knowledgeResult").innerText="Searching...";

let reply=await callGemini(

"Explain nutrition topic clearly: "+topic

);

document.getElementById("knowledgeResult").innerText=reply;

}

</script>


</body>
</html>
