<!DOCTYPE html>
<html>
<head>

<title>NutriSense AI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7f5;
}

header{
background:#2e7d66;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

nav{
display:flex;
justify-content:center;
gap:20px;
background:#e2ece7;
padding:15px;
}

.tabbtn{
padding:10px 20px;
border:none;
background:#2e7d66;
color:white;
cursor:pointer;
border-radius:8px;
}

.tabbtn:hover{
background:#1e5a49;
}

.section{
display:none;
padding:40px;
max-width:900px;
margin:auto;
}

.active{
display:block;
}

input,textarea{
width:90%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button.action{
margin-top:15px;
padding:10px 25px;
background:#2e7d66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button.action:hover{
background:#1e5a49;
}

.result{
margin-top:25px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>
NutriSense AI 🍎 Smart Nutrition Assistant
</header>


<nav>

<button class="tabbtn" onclick="switchTab('chat')">Chat</button>

<button class="tabbtn" onclick="switchTab('analyzer')">Meal Analyzer</button>

<button class="tabbtn" onclick="switchTab('knowledge')">Knowledge</button>

</nav>



<!-- CHAT TAB -->

<div id="chat" class="section active">

<h2>Nutrition Chat Assistant</h2>

<input id="chatInput" placeholder="Ask something about nutrition">

<br>

<button class="action" onclick="sendChat()">Ask</button>

<div class="result" id="chatResult"></div>

</div>



<!-- ANALYZER TAB -->

<div id="analyzer" class="section">

<h2>Meal Analyzer</h2>

<textarea id="mealInput"
placeholder="Describe your meal (example: rice, chicken, salad)">
</textarea>

<br>

<button class="action" onclick="analyzeMeal()">
Analyze Meal
</button>

<div class="result" id="mealResult"></div>

</div>



<!-- KNOWLEDGE TAB -->

<div id="knowledge" class="section">

<h2>Nutrition Knowledge Search</h2>

<input id="knowledgeInput"
placeholder="Search topic (example: vitamin D benefits)">

<br>

<button class="action" onclick="searchKnowledge()">
Search
</button>

<div class="result" id="knowledgeResult"></div>

</div>



<script>

const API_KEY =
"AIzaSyBO3BYCAqKn-ns2DZ6YS-XC0bysAy7yncE";


function switchTab(tab){

window.location.hash = tab;

document.querySelectorAll(".section")
.forEach(sec => sec.classList.remove("active"));

document.getElementById(tab)
.classList.add("active");

}



window.addEventListener("load", () => {

const hash =
window.location.hash.replace("#","");

if(hash){

switchTab(hash);

}

});



async function callGemini(prompt){

const response = await fetch(

`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[

{
parts:[{ text: prompt }]
}

]

})

});

const data = await response.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text
|| "No response received.";

}



async function sendChat(){

const text =
document.getElementById("chatInput").value;

if(!text) return;

document.getElementById("chatResult").innerText =
"Thinking...";

const reply =
await callGemini(text);

document.getElementById("chatResult").innerText =
reply;

}



async function analyzeMeal(){

const meal =
document.getElementById("mealInput").value;

if(!meal) return;

document.getElementById("mealResult").innerText =
"Analyzing meal...";

const reply =
await callGemini(
"Analyze this meal nutritionally and suggest improvements: "
+ meal
);

document.getElementById("mealResult").innerText =
reply;

}



async function searchKnowledge(){

const topic =
document.getElementById("knowledgeInput").value;

if(!topic) return;

document.getElementById("knowledgeResult").innerText =
"Searching knowledge base...";

const reply =
await callGemini(
"Explain this nutrition topic clearly: "
+ topic
);

document.getElementById("knowledgeResult").innerText =
reply;

}

</script>

</body>
</html>
